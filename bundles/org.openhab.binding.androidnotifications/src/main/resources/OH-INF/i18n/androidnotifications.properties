# add-on

addon.androidnotifications.name = Android Notifications Binding
addon.androidnotifications.description = This binding can send messages, pictures and video streams to your Android based TV. It requires either `TvOverlay` or `Android TV Notifications` Google Play Store app to connect with on your TV.

# thing types

thing-type.androidnotifications.nfatvdisplay.label = Notifications for Android TV Display Connection
thing-type.androidnotifications.nfatvdisplay.description = Notifications for Android TV is a Google Play store app by Christian Fees. Use this thing for each of your TV's that have this app installed and setup correctly.
thing-type.androidnotifications.tvoverlaydisplay.label = Tv Overlay Display Connection
thing-type.androidnotifications.tvoverlaydisplay.description = TvOverlay is a Google Play store app by Tab Developer. Add one of these for each TV that is running the correctly setup and working app.

# thing types config

thing-type.config.androidnotifications.nfatvdisplay.address.label = Address
thing-type.config.androidnotifications.nfatvdisplay.address.description = Enter just the IP or Hostname without the port or http/s
thing-type.config.androidnotifications.nfatvdisplay.port.label = Port
thing-type.config.androidnotifications.nfatvdisplay.port.description = This port will be used for sending messages to your TV.
thing-type.config.androidnotifications.nfatvdisplay.refreshInterval.label = Refresh Interval
thing-type.config.androidnotifications.nfatvdisplay.refreshInterval.description = Interval the device is polled in sec.
thing-type.config.androidnotifications.tvoverlaydisplay.address.label = Address
thing-type.config.androidnotifications.tvoverlaydisplay.address.description = Enter just the IP or Hostname without the port or http/s
thing-type.config.androidnotifications.tvoverlaydisplay.port.label = Port
thing-type.config.androidnotifications.tvoverlaydisplay.port.description = This port will be used for sending messages to your TV.
thing-type.config.androidnotifications.tvoverlaydisplay.refreshInterval.label = Refresh Interval
thing-type.config.androidnotifications.tvoverlaydisplay.refreshInterval.description = Interval the device is polled in sec.

