channel-type.androidnotifications.lastMessageDate.description = Contains the latest message date as a DateTime
channel-type.androidnotifications.lastMessageName.label = Last Message Name
channel-type.androidnotifications.lastMessageName.description = Contains the latest message senders name as a string
channel-type.androidnotifications.lastMessageText.label = Last Message Text
channel-type.androidnotifications.lastMessageText.description = Contains the latest message text as a string
channel-type.androidnotifications.lastMessageURL.label = Last Message URL
channel-type.androidnotifications.lastMessageURL.description = Contains the URL of the latest message
channel-type.androidnotifications.lastMessageUsername.label = Last Message Username
channel-type.androidnotifications.lastMessageUsername.description = Contains the latest message senders username as a string

